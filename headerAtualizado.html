<style>
    @import url('https://fonts.googleapis.com/css?family=Jaapokki+Subtract&display=swap');

    /* Escopamos os estilos para evitar que afetem o resto da página */
    .custom-header {
        font-family: 'Jaapokki Subtract', sans-serif;
        background-image: url('assets/images/Background.png');
        background-size: cover;
        background-position: center;
        padding: 5px 1%;
        position: relative;
        width: 100%;
        min-height: 80px;
        box-sizing: border-box;
    }

    .header-container {
        display: flex; 
        justify-content: space-between; 
        align-items: center;
        max-width: 1200px;
        margin: 0 auto;
        width: 100%;
    }

    .nav-content {
        display: none;
        align-items: center;
        gap: 0;
    }

    .nav-links, .nav-links-mobile {
        display: flex;
        gap: 20px;
    }

    .nav-links a, .nav-links-mobile a{
        transition: background-color 0.3s ease, transform 0.3s ease;
  
        /* Garante que o elemento tem um aspeto inicial (opcional) */
        background-color: transparent;
        border-radius: 10px;
        padding: 5px 5px;
    }

    .nav-links a:hover, .nav-links-mobile a:hover{
        background-color: rgba(255, 255, 255, 0.2);
        transform: scale(1.1);
    }

    .nav-link-style {
        text-decoration: none; 
        color: white; 
        font-weight: bold;
    }

    .btn-orange {
        background-color: #FF9114; 
        color: white; 
        border: none; 
        padding: 10px 20px; 
        border-radius: 5px; 
        cursor: pointer;
        font-weight: bold;
    }

    .menu-toggle {
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 5px;
        background: transparent;
        border: none;
        cursor: pointer;
        z-index: 1001;
        width: 50px;
    }

    .menu-toggle .bar {
        width: 30px;
        height: 3px;
        background-color: white;
        border-radius: 2px;
    }

    /* MOBILE */
    @media (max-width: 771px) {
        .custom-header {
            padding: 10px 20px; /* Reduz padding para não esticar no mobile */
        }

        .menu-toggle {
            display: flex;
        }

        .nav-content {
            display: flex;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease-in-out;
            flex-direction: column;
            position: absolute;
            z-index: 10005;
            top: 60%; 
            left: 70%;
            width: 20%;
            min-width: 110px;
            background-image: url('assets/images/Background.png');
            background-size: cover;
            background-position: center;
            border-radius: 5%;
            padding: 20px;
            text-align: center;
            box-sizing: border-box; /* Crucial para a largura não passar dos 100% */
        }

        .nav-content.active {
            opacity: 1; 
            pointer-events: auto;
        }

        .nav-links {
            display: none; /* Esconde os links normais no mobile */
        }

        .auth-buttons {
            display: none; /* Esconde os botões normais no mobile */
        }
        
        .auth-buttons-mobile {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .nav-links-mobile {
            flex-direction: column;
            margin-bottom: 20px;
        }
    }

    @media (max-width: 360px) {
        .nav-content {
            left: 55%;
        }
    }
</style>

<header class="custom-header">
    <div class="header-container">
        <div class="logo">
            <img src="assets/images/Logo.png" alt="Logo" style="height: 70px;">
        </div>

        <button class="menu-toggle" id="mobile-menu" aria-label="Menu">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>

        <nav class="nav-links">
            <a href="indexAtualizado.html" class="nav-link-style">Home</a>
            <a href="activitiesAtualizado.html" class="nav-link-style">Activities</a>
            <a href="scheduleAtualizado.html" class="nav-link-style">Schedule</a>
            <a href="meettheteamAtualizado.html" class="nav-link-style">Meet the Team</a>
            
        </nav>
    

        <div class="nav-content" id="nav-content">
            <nav class="nav-links-mobile">
                <a href="indexAtualizado.html" class="nav-link-style">Home</a>
                <a href="activitiesAtualizado.html" class="nav-link-style">Activities</a>
                <a href="scheduleAtualizado.html" class="nav-link-style">Schedule</a>
                <a href="meettheteamAtualizado.html" class="nav-link-style">Meet the Team</a>
               
            </nav>
            <div class="auth-buttons-mobile">
               
            </div>
        </div>
    </div>
</header>

<script>
    (function() {
        const menuBtn = document.getElementById('mobile-menu');
        const navContent = document.getElementById('nav-content');

        if (menuBtn && navContent) {
            // Remove listeners antigos para evitar duplicação se reinjetado
            const newBtn = menuBtn.cloneNode(true);
            menuBtn.parentNode.replaceChild(newBtn, menuBtn);

            newBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                navContent.classList.toggle('active');
            });
        }
    })();
</script>
