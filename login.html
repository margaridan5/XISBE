<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In – XI SBE</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="login-page">
    <div class="container">
        <div class="signupForm" style="position: relative;">
            <button type="button" onclick="history.back()" style="position:absolute;top:12px;right:14px;background:none;border:none;font-size:22px;cursor:pointer;color:#555;padding:0;line-height:1;" aria-label="Go back">&times;</button>
            <div class="inSignForm">
                <h1>Log In</h1>
                <form id="loginForm">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    <span id="error-email" class="errorMessage"></span>

                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    <span id="error-password" class="errorMessage" style="margin-bottom:0;min-height:0;"></span>
                    <p style="margin: 2px 0 10px; text-align: left;"><a href="forgot-password.html" style="font-size: 13px;">Forgot your password?</a></p>

                    <div style="display: flex; justify-content: space-between; width:100%; margin-top: 20px; margin-bottom: 20px;">
                        <button type="button" onclick="history.back()" style="background-color: #6c757d; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer;">
                            Cancel
                        </button>
                        <button type="submit">Log In</button>
                    </div>
                </form>
                <p style="margin-top: 14px;">Don't have an account? <a href="signupDB.html">Sign Up</a></p>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://tcsbqigmjcoscrtrtmxa.supabase.co';
        const supabaseKey = 'sb_publishable_8WpYQngE6loxjIH3Wwj6Cg_NSnZnugf';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        const form = document.getElementById('loginForm');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            document.getElementById('error-email').innerText = '';
            document.getElementById('error-password').innerText = '';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.disabled = true;

            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) {
                if (error.message.toLowerCase().includes('invalid') || error.message.toLowerCase().includes('credentials')) {
                    document.getElementById('error-password').innerText = 'Email or password incorrect.';
                } else {
                    document.getElementById('error-password').innerText = error.message;
                }
                submitBtn.disabled = false;
            } else {
                const redirectTo = new URLSearchParams(window.location.search).get('redirect') || 'index.html';
                window.location.href = redirectTo;
            }
        });
    </script>
</body>
</html>
