<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password – XI SBE</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="login-page">
    <div class="container">
        <div class="signupForm" style="position: relative;">
            <button type="button" onclick="history.back()" style="position:absolute;top:12px;right:14px;background:none;border:none;font-size:22px;cursor:pointer;color:#555;padding:0;line-height:1;" aria-label="Go back">&times;</button>
            <div class="inSignForm">
                <h1>Reset Password</h1>
                <p style="text-align:center; margin-bottom: 20px; color: #555; font-size: 14px;">
                    Enter your email and we'll send you a link to reset your password.
                </p>

                <div id="success-msg" style="display:none; background:#d4edda; color:#155724; border:1px solid #c3e6cb; border-radius:6px; padding:14px; margin-bottom:16px; text-align:center;">
                    Email sent! Check your inbox for the reset link.
                </div>

                <form id="forgotForm">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    <span id="error-email" class="errorMessage"></span>

                    <div style="display: flex; justify-content: flex-end; width:100%; margin-top: 10px;">
                        <button type="submit" id="submitBtn">Send Reset Link</button>
                    </div>
                </form>

                <p style="margin-top: 16px;"><a href="login.html">Back to Log In</a></p>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://tcsbqigmjcoscrtrtmxa.supabase.co';
        const supabaseKey = 'sb_publishable_8WpYQngE6loxjIH3Wwj6Cg_NSnZnugf';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('forgotForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const submitBtn = document.getElementById('submitBtn');
            const errorEl = document.getElementById('error-email');

            errorEl.innerText = '';
            submitBtn.disabled = true;
            submitBtn.innerText = 'Sending...';

            const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/reset-password.html'
            });

            if (error) {
                errorEl.innerText = error.message;
                submitBtn.disabled = false;
                submitBtn.innerText = 'Send Reset Link';
            } else {
                document.getElementById('forgotForm').style.display = 'none';
                document.getElementById('success-msg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
