<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Password – XI SBE</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="login-page">
    <div class="container">
        <div class="signupForm" style="position: relative;">
            <div class="inSignForm">

                <div id="view-loading" style="text-align:center; color:#555; padding: 20px 0;">
                    Verifying link...
                </div>

                <div id="view-form" style="display:none;">
                    <h1>New Password</h1>
                    <p style="text-align:center; margin-bottom: 20px; color:#555; font-size:14px;">
                        Choose a new password for your account.
                    </p>
                    <form id="resetForm">
                        <label for="password">New Password:</label>
                        <input type="password" id="password" name="password" placeholder="At least 6 characters" required>
                        <span id="error-password" class="errorMessage"></span>

                        <label for="confirmPassword">Confirm Password:</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat your password" required>
                        <span id="error-confirm" class="errorMessage"></span>

                        <div style="display: flex; justify-content: flex-end; width:100%; margin-top: 10px;">
                            <button type="submit" id="submitBtn">Save Password</button>
                        </div>
                    </form>
                </div>

                <div id="view-success" style="display:none; text-align:center;">
                    <h1>Done!</h1>
                    <p style="margin: 16px 0;">Your password has been updated.</p>
                    <a href="login.html">Go to Log In</a>
                </div>

                <div id="view-error" style="display:none; text-align:center;">
                    <h1>Invalid Link</h1>
                    <p style="margin: 16px 0; color:#721c24;">This reset link is expired or already used.</p>
                    <a href="forgot-password.html">Request a new one</a>
                </div>

            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://tcsbqigmjcoscrtrtmxa.supabase.co';
        const supabaseKey = 'sb_publishable_8WpYQngE6loxjIH3Wwj6Cg_NSnZnugf';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        function show(id) {
            ['view-loading', 'view-form', 'view-success', 'view-error'].forEach(v => {
                document.getElementById(v).style.display = v === id ? 'block' : 'none';
            });
        }

        // Supabase injects the session from the reset link into the URL hash.
        // onAuthStateChange fires with event "PASSWORD_RECOVERY" when it detects it.
        supabaseClient.auth.onAuthStateChange(async (event, session) => {
            if (event === 'PASSWORD_RECOVERY') {
                show('view-form');
            } else if (event === 'SIGNED_IN' && !session) {
                show('view-error');
            }
        });

        // Fallback: if no token in URL after a moment, show error
        setTimeout(() => {
            if (document.getElementById('view-loading').style.display !== 'none') {
                show('view-error');
            }
        }, 4000);

        document.getElementById('resetForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');

            document.getElementById('error-password').innerText = '';
            document.getElementById('error-confirm').innerText = '';

            if (password.length < 6) {
                document.getElementById('error-password').innerText = 'Password must be at least 6 characters.';
                return;
            }
            if (password !== confirm) {
                document.getElementById('error-confirm').innerText = 'Passwords do not match.';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = 'Saving...';

            const { error } = await supabaseClient.auth.updateUser({ password });

            if (error) {
                document.getElementById('error-password').innerText = error.message;
                submitBtn.disabled = false;
                submitBtn.innerText = 'Save Password';
            } else {
                show('view-success');
            }
        });
    </script>
</body>
</html>
